<p-dialog
  header="{{ cabecera }}"
  [(visible)]="visible"
  [style]="{ width: '90%' }"
  [breakpoints]="{ '960px': '95vw', '640px': '100vw' }"
  [modal]="true"
  [maximizable]="true"
  [draggable]="false"
  [blockScroll]="true"
  [resizable]="false"
  [closable]="true"
  [contentStyle]="{ overflow: 'auto' }"
  (accionBtnItem)="accionBtn($event)"
>
  <section>
    <form [formGroup]="formCurso">
      <div class="grid p-fluid mt-3">
        <div class="col-12 md:col-10">
          <div class="grid">
            <div class="col-12 md:col-6">
              <p-inputGroup>
                <p-inputGroupAddon>
                  <span>ÁREA</span>
                </p-inputGroupAddon>
                <input
                  pInputText
                  class="p-disabled group-element"
                  id="cCursoNombre"
                  formControlName="cCursoNombre"
                  readonly
                />
              </p-inputGroup>
            </div>
            <div class="col-12 md:col-6">
              <p-inputGroup>
                <p-inputGroupAddon>
                  <span>Docente</span>
                </p-inputGroupAddon>
                <input
                  pInputText
                  class="p-disabled group-element"
                  id="cNombreDocente"
                  formControlName="cNombreDocente"
                  readonly
                />
              </p-inputGroup>
            </div>
            <div class="col-12 md:col-4">
              <p-inputGroup>
                <p-inputGroupAddon>
                  <span>NIVEL</span>
                </p-inputGroupAddon>
                <input
                  pInputText
                  class="p-disabled group-element"
                  id="cNivelTipoNombre"
                  formControlName="cNivelTipoNombre"
                  readonly
                />
              </p-inputGroup>
            </div>
            <div class="col-12 md:col-4">
              <p-inputGroup>
                <p-inputGroupAddon>
                  <span>GRADO</span>
                </p-inputGroupAddon>
                <input
                  pInputText
                  class="p-disabled group-element"
                  id="cGradoAbreviacion"
                  formControlName="cGradoAbreviacion"
                  readonly
                />
              </p-inputGroup>
            </div>
            <div class="col-12 md:col-4">
              <p-inputGroup>
                <p-inputGroupAddon>
                  <span>SECCIÓN</span>
                </p-inputGroupAddon>
                <p-dropdown
                  [options]="secciones"
                  [style]="{ width: '100%' }"
                  filterBy="cSeccionDescripcion"
                  optionLabel="cSeccionDescripcion"
                  optionValue="iSeccionId"
                  formControlName="iSeccionId"
                  (onChange)="filtrado($event)"
                  [style]="{ flex: '1', width: '100%' }"
                  styleClass="group-element"
                  [appendTo]="'body'"
                >
                </p-dropdown>
              </p-inputGroup>
            </div>
          </div>
        </div>
        <div class="col-12 md:col-2">
          <div class="text-center">
            <div class="inline md:block justify-content-center mx-2">
              <span class="md:text-7xl font-bold text-primary">{{ alumnosFiltrados?.length }}</span>
            </div>
            <div class="inline md:block justify-content-center mx-2">
              <span class="text-base text-gray-600 mt-2">Estudiantes matriculados</span>
            </div>
          </div>
        </div>
      </div>
    </form>
    <div class="col">
      <app-table-primeng
        [columnas]="columnas"
        [data]="alumnosFiltrados"
        (accionBtnItem)="accionBtn($event)"
        [actions]="botonesTabla"
        [showPaginator]="true"
        [showCaption]="true"
        [showSortIcon]="false"
        [width]="'30px'"
        [soloUnaLetra]="true"
        [showSearchTable]="false"
        [searchPlaceholder]="'Buscar por apellido paterno...'"
        [indiceColumnaBuscar]="2"
        [(selectedRowData)]="alumnoSeleccionado"
      >
      </app-table-primeng>
    </div>

    <!--<div class="grid p-fluid mt-3">
            <div class="field col-12">

                <p-button
                    type="submit"
                    label="Guardar"
                    styleClass="p-button-primary"
                    [disabled]="formCurso.invalid"
                />
            </div>
        </div>-->
  </section>
</p-dialog>

<p-toast key="guardar-resultados-online"></p-toast>

<input type="file" #fileInput hidden (change)="onFileSelectedHojaDesarrollo($event)" />
