<app-container-page
  [title]="'Registro de Vacantes para el año: ' + anio_actual"
  [actions]="accionesPrincipal"
  (accionBtnItem)="accionBtnItem($event)"
>
  <form [formGroup]="form">
    <div class="grid">
      <div class="col-12 lg:col-6">
        <p-fieldset legend="Filtros Generales">
          <div class="grid">
            <div class="col-12 md:col-6">
              <p-inputGroup>
                <p-inputGroupAddon>Nivel *</p-inputGroupAddon>
                <p-dropdown
                  pInputGroupItem
                  styleClass="w-full"
                  [options]="nivel_tipos"
                  formControlName="iNivelTipoId"
                  placeholder="Seleccione un nivel"
                  optionLabel="cNivelTipoNombre"
                  optionValue="iNivelTipoId"
                  [appendTo]="'body'"
                  [showClear]="true"
                  (onChange)="filtrarInstituciones()"
                ></p-dropdown>
              </p-inputGroup>
            </div>
            <div class="col-12 md:col-6" *ngIf="form.get('iNivelTipoId')?.value > 0">
              <p-inputGroup>
                <p-inputGroupAddon>Gestión</p-inputGroupAddon>
                <p-dropdown
                  [options]="tipo_sectores"
                  [showClear]="true"
                  formControlName="iTipoSectorId"
                  placeholder="Seleccione un tipo de gestión"
                  styleClass="w-full"
                  optionLabel="cTipoSectorNombre"
                  optionValue="iTipoSectorId"
                  [showClear]="true"
                  [appendTo]="'body'"
                  (onChange)="filtrarInstituciones()"
                ></p-dropdown>
              </p-inputGroup>
            </div>

            <div class="col-12" *ngIf="form.get('iNivelTipoId')?.value > 0">
              <p-inputGroup>
                <p-inputGroupAddon>UGEL</p-inputGroupAddon>
                <p-dropdown
                  [options]="ugeles"
                  [showClear]="true"
                  formControlName="iUgelId"
                  placeholder="Seleccione una UGEL"
                  styleClass="w-full"
                  [appendTo]="'body'"
                  optionLabel="cUgelNombre"
                  optionValue="iUgelId"
                  [showClear]="true"
                  (onChange)="filtrarInstituciones()"
                ></p-dropdown>
              </p-inputGroup>
            </div>

            <div class="col-12 md:col-6" *ngIf="form.get('iNivelTipoId')?.value > 0">
              <p-inputGroup>
                <p-inputGroupAddon>Zona</p-inputGroupAddon>
                <p-dropdown
                  [options]="zonas"
                  [showClear]="true"
                  formControlName="iZonaId"
                  placeholder="Seleccione un tipo de zona"
                  styleClass="w-full"
                  optionLabel="cZonaNombre"
                  optionValue="iZonaId"
                  [showClear]="true"
                  [appendTo]="'body'"
                  (onChange)="filtrarInstituciones()"
                ></p-dropdown>
              </p-inputGroup>
            </div>

            <div class="col-12 md:col-6" *ngIf="form.get('iNivelTipoId')?.value > 0">
              <p-inputGroup>
                <p-inputGroupAddon>Distrito</p-inputGroupAddon>
                <p-dropdown
                  [options]="distritos"
                  [showClear]="true"
                  formControlName="iDsttId"
                  placeholder="Seleccione un distrito"
                  styleClass="w-full"
                  [appendTo]="'body'"
                  filter="true"
                  optionLabel="cDsttNombre"
                  optionValue="iDsttId"
                  [showClear]="true"
                  (onChange)="filtrarInstituciones()"
                ></p-dropdown>
              </p-inputGroup>
            </div>
          </div>
        </p-fieldset>
      </div>
      <div class="col-12 lg:col-6">
        <p-fieldset legend="Filtros Institucional">
          <div class="grid">
            @if (es_especialista) {
              <div class="col-12" *ngIf="form.get('iNivelTipoId')?.value > 0">
                <p-inputGroup>
                  <p-inputGroupAddon>I. E.</p-inputGroupAddon>
                  <p-dropdown
                    [options]="filtradoIE"
                    [showClear]="true"
                    formControlName="iIieeId"
                    placeholder="Seleccione una Institución Educativa"
                    styleClass="w-full"
                    [appendTo]="'body'"
                    filter="true"
                    optionLabel="cIieeNombreCompleto"
                    optionValue="iIieeId"
                    [showClear]="true"
                    (onChange)="filtrarSedes()"
                  />
                </p-inputGroup>
              </div>
              <div
                class="col-12"
                *ngIf="form.get('iIieeId')?.value > 0 && form.get('iNivelTipoId')?.value > 0"
              >
                <p-inputGroup>
                  <p-inputGroupAddon>Sede</p-inputGroupAddon>
                  <p-dropdown
                    [options]="FiltradoSede"
                    [showClear]="true"
                    formControlName="iSedeId"
                    placeholder="Seleccione una sede"
                    styleClass="w-full"
                    [appendTo]="'body'"
                    optionLabel="cSedeNombre"
                    optionValue="iSedeId"
                    [showClear]="true"
                    (onChange)="obtenerGradoSeccion()"
                  />
                </p-inputGroup>
              </div>
            }
            <div
              class="col-12 md:col-6"
              *ngIf="form.get('iSedeId')?.value > 0 && form.get('iNivelTipoId')?.value > 0"
            >
              <p-inputGroup>
                <p-inputGroupAddon>Nivel Grado</p-inputGroupAddon>
                <p-dropdown
                  formControlName="iGradoId"
                  styleClass="w-full"
                  placeholder="Seleccione Grado"
                  optionValue="iNivelGradoId"
                  [options]="grados"
                  optionLabel="cGradoNombre"
                  (onChange)="obtenerSecciones()"
                  [showClear]="true"
                  (onChange)="obtenerSecciones()"
                />
              </p-inputGroup>
            </div>
            <div
              class="col-12 md:col-6"
              *ngIf="form.get('iGradoId')?.value > 0 && form.get('iNivelTipoId')?.value > 0"
            >
              <p-inputGroup>
                <p-inputGroupAddon>Sección</p-inputGroupAddon>
                <p-dropdown
                  formControlName="iSeccionId"
                  styleClass="w-full"
                  placeholder="Seleccione Sección"
                  optionValue="iSeccionId"
                  [options]="secciones"
                  optionLabel="cSeccionNombre"
                  [showClear]="true"
                  (onChange)="getVacantes()"
                />
              </p-inputGroup>
            </div>
          </div>
        </p-fieldset>
      </div>
    </div>
  </form>
  <div class="grid">
    <div class="col-12 md:col-2 text-right" *ngIf="form.get('iSedeId')?.value > 0">
      <button pButton pRipple type="button" class="p-button-primary" (click)="getVacantes()">
        <i class="pi pi-search"></i>&nbsp;Buscar
      </button>
    </div>

    <div class="col-12 md:col-12">
      <br />
      <app-table-primeng
        [columnas]="columns"
        [data]="vacantes"
        [scrollable]="true"
        (accionBtnItem)="accionBtnItem($event)"
        [showPaginator]="true"
        [(selectedRowData)]="selectedItems"
        [showAdvancedFilter]="true"
        [showCaption]="false"
      >
      </app-table-primeng>
    </div>
  </div>
</app-container-page>
