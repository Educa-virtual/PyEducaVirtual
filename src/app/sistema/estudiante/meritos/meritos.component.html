<p-breadcrumb class="max-w-full" [model]="breadCrumbItems" [home]="breadCrumbHome" />
<app-container-page [title]="'Mis méritos'" [actions]="[]">
  <div class="grid">
    <div class="ml-auto">
      <p-selectButton
        [(ngModel)]="layout"
        [options]="options"
        [allowEmpty]="false"
        (onChange)="onLayoutChange()"
      >
        <ng-template pTemplate="item" let-item>
          <i
            class="pi"
            [ngClass]="{
              'pi-bars': item === 'list',
              'pi-th-large': item === 'grid',
            }"
          ></i>
        </ng-template>
      </p-selectButton>
    </div>

    <div class="col-12" [ngSwitch]="layout">
      <!-- ✔ VISTA TABLA -->
      <div *ngSwitchCase="'list'">
        @if (meritos().length > 0) {
          <app-table-primeng
            [columnas]="columns"
            [data]="meritos()"
            [scrollable]="true"
            [showPaginator]="true"
            [(selectedRowData)]="selectedItems"
            [actions]="[]"
            [showAdvancedFilter]="true"
            [showCaption]="false"
          >
          </app-table-primeng>
        } @else {
          <app-no-data [showIcon]="'NO-DATA'" mensaje="No se encontraron méritos registrados" />
        }
      </div>

      <!-- ✔ VISTA CARDS -->
      <div *ngSwitchCase="'grid'" class="grid">
        <div class="col-12" *ngFor="let grupo of meritosAgrupados">
          <!-- Cards del tipo -->
          <!-- Agrupación por tipo -->

          <!-- Título del tipo -->
          <div class="flex justify-content-between align-items-center mb-3">
            <h3 class="m-0 text-uppercase text-primary">{{ grupo.tipo }}</h3>
            <p-badge value="{{ grupo.items.length }}" severity="contrast"></p-badge>
          </div>

          <!-- Cards del tipo -->
          <div class="grid">
            <div class="col-12 md:col-4 lg:col-3" *ngFor="let item of grupo.items">
              <p-card class="shadow-2 border-round-xl merito-card" [header]="item.cMeritoNombre">
                @if (item.iMeritoPuesto > 0) {
                  <div class="flex justify-content-center">
                    <div
                      class="p-3 border-circle bg-yellow-100 flex justify-content-center align-items-center shadow-2"
                    >
                      <i class="pi pi-trophy text-yellow-600 text-3xl"></i>
                    </div>
                  </div>
                  <br />
                } @else {
                  <div class="flex justify-content-center">
                    <div
                      class="p-3 border-circle bg-blue-100 flex justify-content-center align-items-center shadow-2"
                    >
                      <i class="text-3xl">🥇</i>
                    </div>
                  </div>
                  <br />
                }

                <!-- Detalles del mérito -->
                <div class="flex flex-column gap-2">
                  <div class="flex justify-content-center">
                    <div
                      class="flex align-items-start gap-2 max-w-22rem bg-gray-50 p-3 border-round-lg shadow-1"
                    >
                      <i class="pi pi-sparkles text-yellow-500 text-xl mt-1"></i>
                      <div class="text-sm text-700 line-height-3">
                        <span class="font-semibold">Descripción:</span>
                        {{ item.cMeritoDescripcion }}
                        <span
                          class="text-sm text-600 col-6"
                          *ngIf="
                            item.iMeritoPuntaje !== null &&
                            item.iMeritoPuntaje !== undefined &&
                            item.iMeritoPuntaje !== '' &&
                            item.iMeritoPuntaje > 0
                          "
                        >
                          <br />
                          <strong>Puntaje:</strong>
                          <p-badge value="{{ item.iMeritoPuntaje }}" severity="info"></p-badge>
                        </span>
                        <span
                          class="text-sm text-600 col-6"
                          *ngIf="
                            item.iMeritoPuesto !== null &&
                            item.iMeritoPuesto !== undefined &&
                            item.iMeritoPuesto !== '' &&
                            item.iMeritoPuesto > 0
                          "
                        >
                          <strong>Puesto:</strong>
                          <p-badge value="{{ item.iMeritoPuesto }}" severity="primary"></p-badge>
                        </span>
                      </div>
                    </div>
                  </div>

                  <!-- <div class="text-sm text-600">
                    <strong>Estado:</strong>
                    <p-badge [severity]="item.iEstado === '1' ? 'success' : 'danger'"
                      value="{{ item.iEstado === '1' ? 'Activo' : 'Inactivo' }}">
                    </p-badge>
                  </div> -->
                </div>
              </p-card>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</app-container-page>
